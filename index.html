<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Toshi Briefs</title>
  <style>
    :root {
      --fg: #1a1a1a;
      --muted: #666;
      --accent: #0a58ca;
      --border: #e5e5e5;
      --bg: #fafafa;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: var(--fg);
      background: var(--bg);
      max-width: 720px;
      margin: 3rem auto;
      padding: 0 1.25rem;
      line-height: 1.5;
    }
    h1 { margin: 0 0 0.25rem; font-size: 1.75rem; }
    p.tagline { color: var(--muted); margin: 0 0 2rem; }
    ul.briefs { list-style: none; padding: 0; margin: 0; }
    ul.briefs li {
      padding: 0.875rem 0;
      border-bottom: 1px solid var(--border);
    }
    ul.briefs li:last-child { border-bottom: none; }
    .date { color: var(--muted); font-variant-numeric: tabular-nums; font-size: 0.9rem; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .title { display: block; font-weight: 500; margin-top: 0.125rem; }
    footer {
      margin-top: 3rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.85rem;
    }
  </style>
</head>
